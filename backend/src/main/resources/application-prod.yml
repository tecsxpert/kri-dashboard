# application-prod.yml
# Day 14 — Production Profile Configuration
# Activate with: --spring.profiles.active=prod  OR  SPRING_PROFILES_ACTIVE=prod

spring:
  datasource:
    url: ${PROD_DB_URL:jdbc:postgresql://localhost:5432/kri_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

security:
  jwt:
    secret-key: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.internship.tool: INFO
    org.springframework.security: WARN
    org.flywaydb: WARN
  file:
    name: /var/log/kri-dashboard/app.log

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/csv
    min-response-size: 2048

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
