<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>New KRI Record Created</title>
    <style>
        body  { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; }
        .wrap { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,.1); overflow: hidden; }
        .hdr  { background: #1a73e8; padding: 28px 32px; }
        .hdr h1 { margin: 0; color: #ffffff; font-size: 22px; font-weight: 600; }
        .body { padding: 32px; }
        .body p.lead { font-size: 15px; color: #444; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { text-align: left; padding: 10px 12px; font-size: 14px; }
        th { background: #f0f4ff; color: #1a73e8; font-weight: 600; width: 35%; }
        td { color: #333; border-bottom: 1px solid #eee; }
        .ftr  { background: #f4f6f9; padding: 16px 32px; text-align: center;
                font-size: 12px; color: #999; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="hdr">
        <h1>✅ New KRI Record Created</h1>
    </div>
    <div class="body">
        <p class="lead">A new KRI record has been successfully created in the system.</p>
        <table>
            <tr><th>Title</th>    <td th:text="${title}">—</td></tr>
            <tr><th>Category</th> <td th:text="${category}">—</td></tr>
            <tr><th>Status</th>   <td th:text="${status}">—</td></tr>
            <tr><th>Due Date</th> <td th:text="${dueDate}">—</td></tr>
            <tr><th>Score</th>    <td th:text="${score}">—</td></tr>
        </table>
    </div>
    <div class="ftr">KRI Dashboard · Automated Notification · Do not reply to this email</div>
</div>
</body>
</html>
