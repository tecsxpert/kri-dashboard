spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kri_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: redis
    redis:
      time-to-live: 600000   # 10 min in ms

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:changeme-use-a-long-random-string-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h

ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:5000}
  timeout-seconds: 10

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.internship.tool: DEBUG
    org.springframework.security: INFO
