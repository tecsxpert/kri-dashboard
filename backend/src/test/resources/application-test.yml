# application-test.yml
# Day 8 — Test profile using H2 in-memory DB (no real Postgres/Redis needed)
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false        # Flyway disabled in test — JPA creates schema via ddl-auto

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none            # Disable Redis cache in tests

  mail:
    host: localhost
    port: 25

security:
  jwt:
    secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000

springdoc:
  api-docs:
    enabled: false

logging:
  level:
    com.internship.tool: WARN
    org.springframework: WARN
