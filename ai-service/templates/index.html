<!DOCTYPE html>
<html>
<head>
    <title>KRI Dashboard</title>
</head>
<body>

<h2>KRI Risk Dashboard</h2>

<input type="text" id="risks" placeholder="Enter risks comma separated">
<button onclick="analyze()">Analyze</button>

<br><br>

<div id="result"></div>

<script>
async function analyze() {
    let input = document.getElementById("risks").value;

    if (!input) {
        alert("Enter risks");
        return;
    }

    let risks = input.split(",");

    try {
        let response = await fetch("/dashboard", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ risks: risks })
        });

        let data = await response.json();
        console.log(data);

        let output = "<h3>Results:</h3>";

        data.results.forEach(r => {
            output += `
                <p>
                <b>${r.risk}</b><br>
                Level: ${r.level}<br>
                Score: ${r.score}<br>
                Category: ${r.category}<br>
                Recommendation: ${r.recommendation}
                </p><hr>
            `;
        });

        document.getElementById("result").innerHTML = output;

    } catch (error) {
        console.error(error);
        alert("Error occurred");
    }
}
</script>

</body>
</html>
